<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Instagram Landing Page Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <section class="phone-preview">
      <div class="phone">
        <div class="screen">
          <h2>Instagram</h2>
          <div class="story-row">
            <span></span><span></span><span></span>
          </div>
          <div class="post"></div>
          <div class="post small"></div>
        </div>
      </div>
    </section>

    <section class="auth-section">
      <div class="login-box">
        <h1>Instagram</h1>

        <form>
          <input type="text" placeholder="Phone number, username, or email">
          <input type="password" placeholder="Password">
          <button type="submit">Log in</button>
        </form>

        <div class="divider">
          <span></span>
          <p>OR</p>
          <span></span>
        </div>

        <a href="#" class="facebook-login">Log in with Facebook</a>
        <a href="#" class="forgot">Forgot password?</a>
      </div>

      <div class="signup-box">
        <p>Don't have an account? <a href="#">Sign up</a></p>
      </div>

      <div class="app-section">
        <p>Get the app.</p>
        <div class="app-buttons">
          <button>Google Play</button>
          <button>Microsoft</button>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <nav>
      <a href="#">Meta</a>
      <a href="#">About</a>
      <a href="#">Blog</a>
      <a href="#">Jobs</a>
      <a href="#">Help</a>
      <a href="#">API</a>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Locations</a>
      <a href="#">Instagram Lite</a>
      <a href="#">Threads</a>
    </nav>
    <p>© 2026 Instagram Clone by Subhash</p>
  </footer>

</body>
</html>
